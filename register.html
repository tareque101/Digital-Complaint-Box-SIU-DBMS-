<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Register Form</title>
<link rel="stylesheet" href="css/register.css">

<script>
  function validateForm() {
    const emailInput = document.querySelector('input[name="email"]').value.trim();

    // Basic email regex for format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(emailInput)) {
      alert("Please enter a valid email address.");
      return false;
    }

    // Allowed email domains
    const allowedDomains = ['gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com'];
    const emailDomain = emailInput.split('@')[1].toLowerCase();

    if (!allowedDomains.includes(emailDomain)) {
      alert("Wrong email address!");
      return false;
    }

    return true; 
  }
</script>

</head>
<body>

<form action="register.php" method="POST" onsubmit="return validateForm()">
  <h2>Create Account</h2>

  <input type="text" name="name" placeholder="Full Name" required autocomplete="name" />

  <input type="email" name="email" placeholder="Email" required autocomplete="email" />

  <input type="password" name="password" placeholder="Password" required autocomplete="new-password" />

  <!-- Changed name from "text" to "dept" -->
  <input type="text" name="dept" placeholder="Department" required autocomplete="off" />

  <select name="role" required>
    <option value="" disabled selected>Select Role</option>
    <option value="student">Student</option>
    <option value="staff">Staff</option>
    <option value="teacher">Teacher</option>
  </select>

  <button type="submit">Register</button>
</form>

</body>
</html>
