<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Complaint</title>
</head>
<body>
    <h2>Submit Your Complaint</h2>
    <form action="submit_complaint.php" method="POST" enctype="multipart/form-data">
        <label>Category:</label><br />
        <input type="text" name="category" required /><br /><br />

        <label>Description:</label><br />
        <textarea name="description" rows="5" required></textarea><br /><br />

        <label>Attachment (optional):</label><br />
        <input type="file" name="attachment" /><br /><br />

        <!-- User ID - ideally from login session, here hardcoded for demo -->
        <input type="hidden" name="user_id" value="1" />

        <button type="submit">Submit Complaint</button>
    </form>
</body>
</html>
