<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CampusVoice</title>
    <link rel="stylesheet" href="css/loginStyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="login-container">
      
        <div class="animated-bg">
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        
        <!-- এখানে form এ action আর method যোগ করা হয়েছে -->
        <form class="login-form" action="login.php" method="POST">

            <h1 class="form-title">
                <i class="fas fa-comment-dots logo-icon"></i>
                SIU<span> Digital Complaint box</span>
            </h1>

            <p class="form-subtitle">Sign in to your account</p>
            
            <div class="input-group">
                <!-- name="email" দিয়ে ইনপুট ফিল্ডের নাম দেয়া হয়েছে -->
                <input type="email" name="email" placeholder=" " required />
                <label>Email Address</label>
                <i class="fas fa-envelope input-icon"></i>
            </div>
            
            <div class="input-group">
                <!-- name="password" দেয়া হয়েছে -->
                <input type="password" name="password" placeholder=" " required />
                <label>Password</label>
                <i class="fas fa-lock input-icon"></i>
                <i class="fas fa-eye password-toggle"></i>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember_me" />
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn">
                <span>Login</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <p class="signup-link">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </form>
    </div>
</body>
</html>
